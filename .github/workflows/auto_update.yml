name: Auto-Update Payloads

on:
  push:
    paths:
      - 'tracked_repos.txt'
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  update-payloads:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Update Script
        run: python update_payloads.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add payloads.json payloads/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update payloads.json and download latest .elf files" && git push)
