<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS5 Payload Manager</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 28px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #38bdf8;
        }
        button {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover {
            background: #0284c7;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }
        #status {
            margin-top: 20px;
            font-size: 14px;
            font-weight: bold;
            min-height: 20px;
        }
        .success { color: #4ade80; }
        .error { color: #f87171; }
        .loading { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Payload Manager</h1>
        <p>Paste a GitHub or Gitea repository URL to automatically fetch the latest release, extract the ELF, calculate the hash, and push it directly to your loader registry.</p>
        
        <input type="text" id="repoUrl" placeholder="e.g. https://github.com/phantomptr/ps5upload" autocomplete="off">
        <button id="addBtn">Add Payload</button>
        
        <div id="status"></div>
    </div>

    <script>
        const btn = document.getElementById('addBtn');
        const input = document.getElementById('repoUrl');
        const status = document.getElementById('status');

        btn.addEventListener('click', async () => {
            const url = input.value.trim();
            if (!url) {
                status.textContent = "Please enter a valid URL.";
                status.className = "error";
                return;
            }

            btn.disabled = true;
            btn.textContent = "Processing... (This takes a moment)";
            status.textContent = "Downloading release and communicating with GitHub...";
            status.className = "loading";

            try {
                const response = await fetch('/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    status.textContent = `Success! Added ${data.payload.name} and pushed to GitHub!`;
                    status.className = "success";
                    input.value = "";
                } else {
                    status.textContent = `Error: ${data.error}`;
                    status.className = "error";
                }
            } catch (err) {
                status.textContent = `Network Error: Could not reach local server.`;
                status.className = "error";
            } finally {
                btn.disabled = false;
                btn.textContent = "Add Payload";
            }
        });
    </script>
</body>
</html>
